<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Gallery - Ultra Light</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Inter', sans-serif; background: #fff; color: #333; line-height: 1.5; }

  /* --- LOGIN --- */
  #login { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #fdf2f5; }
  .login-box { background: #fff; padding: 30px; border-radius: 20px; width: 300px; text-align: center; border: 1px solid #fce4ec; }
  .inp { width: 100%; border: 1px solid #f8bbd0; border-radius: 10px; padding: 12px; font-size: 14px; margin-bottom: 12px; outline: none; }
  .btn-pink { background: #e91e63; color: #fff; border: none; border-radius: 10px; padding: 12px; font-weight: 600; cursor: pointer; width: 100%; }

  /* --- APP --- */
  #app { display: none; }
  .header { padding: 15px 20px; border-bottom: 1px solid #f5f5f5; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: #fff; z-index: 10; }
  .main { max-width: 600px; margin: 0 auto; padding: 20px; }

  /* --- NAV --- */
  .nav-group { margin-bottom: 20px; }
  .btn-nav { background: #f5f5f5; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 500; color: #666; cursor: pointer; margin: 0 5px 5px 0; }
  .btn-nav.active { background: #e91e63; color: #fff; }
  .sub-nav { display: none; margin-top: 10px; gap: 5px; overflow-x: auto; padding-bottom: 5px; }

  /* --- LIST VIEW (MODERN & SIMPLE) --- */
  .file-list { border-top: 1px solid #f5f5f5; }
  .file-item { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #f5f5f5; cursor: pointer; }
  .file-item:active { background: #fafafa; }
  .file-info { display: flex; align-items: center; gap: 15px; }
  .file-icon { width: 40px; height: 40px; background: #fff0f5; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #e91e63; }
  .file-name { font-size: 14px; font-weight: 500; display: block; }
  .file-meta { font-size: 11px; color: #999; }

  /* --- MODAL PREVIEW --- */
  .modal-overlay { 
    display: none; position: fixed; inset: 0; 
    background: rgba(0,0,0,0.9); z-index: 100; 
    align-items: center; justify-content: center; 
  }
  .modal-overlay.open { display: flex; }
  
  /* Tombol X (Tetap di pojok kanan atas layar) */
  .close-btn { 
    position: fixed; top: 20px; right: 20px; 
    background: #fff; border: none; width: 36px; height: 36px; 
    border-radius: 50%; font-size: 18px; font-weight: bold; 
    cursor: pointer; z-index: 120; color: #000;
  }

  .modal-box { 
    width: 100%; max-width: 500px; background: #fff; 
    border-radius: 15px; overflow: hidden; position: relative;
    margin: 20px; z-index: 110;
  }
  .viewer { background: #000; width: 100%; display: flex; align-items: center; justify-content: center; min-height: 200px; }
  .viewer img, .viewer video { max-width: 100%; max-height: 60vh; }
  
  .actions { padding: 20px; border-top: 1px solid #eee; }
  .dl-link { display: block; width: 100%; background: #00c853; color: #fff; text-align: center; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: 600; margin-bottom: 10px; font-size: 14px; }
  .del-btn { width: 100%; background: #fff; border: 1px solid #ffcdd2; color: #d32f2f; padding: 10px; border-radius: 10px; cursor: pointer; font-size: 13px; }
</style>
</head>
<body>

<div id="login">
  <div class="login-box">
    <div style="font-size: 40px; margin-bottom: 5px;">🌸</div>
    <h3 style="margin-bottom: 15px;">Admin Login</h3>
    <input class="inp" id="pass" type="password" placeholder="Password" autofocus>
    <button class="btn-pink" onclick="login()">Enter</button>
  </div>
</div>

<div id="app">
  <div class="header">
    <span style="font-weight: 700; color:#e91e63">Ayuu Panel</span>
    <button class="btn-nav" style="margin:0" onclick="location.reload()">Exit</button>
  </div>

  <div class="main">
    <div class="nav-group">
      <button class="btn-nav" id="btn-sparkle" onclick="setCat('sparkle')">✨ Sparkle</button>
      <button class="btn-nav" id="btn-citlali" onclick="setCat('citlali')">🌙 Citlali</button>
      
      <div id="sub-nav" class="sub-nav">
        <button class="btn-nav" id="type-photo" onclick="setType('photo')">Photo</button>
        <button class="btn-nav" id="type-video" onclick="setType('video')">Video</button>
        <button class="btn-nav" id="type-audio" onclick="setType('audio')">Audio</button>
      </div>
    </div>

    <div id="file-list" class="file-list"></div>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="handleOutsideClick(event)">
  <button class="close-btn" onclick="closeModal()">✕</button>
  <div class="modal-box" onclick="event.stopPropagation()">
    <div id="viewer" class="viewer"></div>
    <div class="actions">
      <div style="margin-bottom:15px">
        <h4 id="m-title" style="font-size:15px"></h4>
        <p id="m-meta" style="font-size:12px; color:#999"></p>
      </div>
      <a href="#" id="dl-link" class="dl-link" download>Download File</a>
      <button class="del-btn" onclick="deleteItem()">Delete Item</button>
    </div>
  </div>
</div>

<script>
let photos = [];
let curCat = '', curType = '', selectedId = null;

function initData() {
  const data = [];
  // Sparkle
  for(let i=1; i<=8; i++) data.push({ id:`s-p-${i}`, url:`Photo/Sparkle/${i}.JPG`, caption:`Sparkle Photo ${i}`, category:'sparkle', type:'photo' });
  data.push({ id:`s-v-1`, url:`Video/vid01.mp4`, caption:`Sparkle Video`, category:'sparkle', type:'video' });
  data.push({ id:`s-a-1`, url:`Audio/Pelempuan.mp3`, caption:`Sparkle Audio`, category:'sparkle', type:'audio' });

  // Citlali
  for(let i=1; i<=25; i++) {
    const num = i < 10 ? `0${i}` : i;
    data.push({ id:`c-p-${i}`, url:`Photo/Citlali/IMG_${num}.JPG`, caption:`Citlali Photo ${i}`, category:'citlali', type:'photo' });
  }
  for(let i=1; i<=5; i++) data.push({ id:`c-v-${i}`, url:`Video/VID_0${i}.MOV`, caption:`Citlali Video ${i}`, category:'citlali', type:'video' });

  photos = data.map(item => ({ ...item, addedAt: new Date().toISOString() }));
}

function login() {
  if(document.getElementById('pass').value === 'AYUU00HOLLY') {
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initData();
  } else alert('Access Denied');
}

function setCat(c) {
  curCat = c; curType = '';
  document.getElementById('sub-nav').style.display = 'flex';
  document.querySelectorAll('#btn-sparkle, #btn-citlali').forEach(b => b.classList.toggle('active', b.id === `btn-${c}`));
  render();
}

function setType(t) {
  curType = t;
  document.querySelectorAll('[id^="type-"]').forEach(b => b.classList.toggle('active', b.id === `type-${t}`));
  render();
}

function render() {
  const container = document.getElementById('file-list');
  if(!curType) { container.innerHTML = '<p style="text-align:center; color:#ccc; padding:40px">Select Type</p>'; return; }
  
  const filtered = photos.filter(p => p.category === curCat && p.type === curType);
  const icons = { photo: '🖼️', video: '🎥', audio: '🎵' };

  container.innerHTML = filtered.map(p => `
    <div class="file-item" onclick="openModal('${p.id}')">
      <div class="file-info">
        <div class="file-icon">${icons[p.type]}</div>
        <div>
          <span class="file-name">${p.caption}</span>
          <span class="file-meta">${p.url.split('/').pop()}</span>
        </div>
      </div>
      <div style="color:#eee">›</div>
    </div>
  `).join('') || '<p style="text-align:center; color:#ccc; padding:40px">Empty</p>';
}

function openModal(id) {
  selectedId = id;
  const item = photos.find(p => p.id === id);
  const v = document.getElementById('viewer');
  document.getElementById('m-title').textContent = item.caption;
  document.getElementById('m-meta').textContent = item.url;
  document.getElementById('dl-link').href = item.url;

  if(item.type === 'photo') v.innerHTML = `<img src="${item.url}">`;
  else if(item.type === 'video') v.innerHTML = `<video src="${item.url}" controls autoplay playsinline style="width:100%"></video>`;
  else v.innerHTML = `<div style="padding:40px"><audio src="${item.url}" controls></audio></div>`;
  
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('viewer').innerHTML = '';
}

// Fitur klik di luar kotak untuk menutup
function handleOutsideClick(e) {
  if (e.target.id === 'modal') closeModal();
}

function deleteItem() {
  if(confirm('Delete this item?')) {
    photos = photos.filter(p => p.id !== selectedId);
    closeModal(); render();
  }
}
</script>
</body>
</html>
