<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Gallery - Clean Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Inter', sans-serif; background: #fff0f5; min-height: 100vh; color: #1a1a1a; }

  /* --- LOGIN --- */
  #login { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-card { background: #fff; border-radius: 20px; padding: 40px; width: 340px; box-shadow: 0 10px 30px rgba(232,80,122,0.1); border: 1px solid #fcd0dd; text-align: center; }
  .inp { width: 100%; border: 1.5px solid #fcd0dd; border-radius: 12px; padding: 12px; font-size: 14px; margin-bottom: 15px; outline: none; transition: 0.2s; }
  .inp:focus { border-color: #e8507a; background: #fff; }
  .btn-pink { width: 100%; background: #e8507a; color: #fff; border: none; border-radius: 12px; padding: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; }
  .btn-pink:hover { background: #d63f6a; transform: translateY(-1px); }

  /* --- LAYOUT --- */
  #app { display: none; }
  .header { background: #fff; border-bottom: 1px solid #fcd0dd; padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
  .main { max-width: 1100px; margin: 0 auto; padding: 30px 20px; }
  
  /* --- NAVIGATION --- */
  .nav-group { margin-bottom: 25px; }
  .btn-nav { background: #fff; border: 1.5px solid #fcd0dd; border-radius: 10px; padding: 8px 16px; font-size: 13px; font-weight: 600; color: #e8507a; cursor: pointer; margin-right: 8px; transition: 0.2s; }
  .btn-nav.active { background: #e8507a; color: #fff; border-color: #e8507a; }
  .sub-nav { display: none; margin-top: 15px; padding-left: 15px; border-left: 3px solid #fcd0dd; gap: 8px; }

  /* --- GRID --- */
  .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
  .card { background: #fff; border-radius: 15px; overflow: hidden; border: 1px solid #fcd0dd; cursor: pointer; transition: 0.2s; position: relative; }
  .card:hover { transform: scale(1.03); box-shadow: 0 10px 20px rgba(232,80,122,0.1); }
  .card-thumb { width: 100%; aspect-ratio: 1/1; background: #fff8fa; display: flex; align-items: center; justify-content: center; position: relative; }
  .card-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .card-title { padding: 10px; font-size: 11px; font-weight: 600; text-align: center; color: #666; }
  .badge { position: absolute; top: 8px; right: 8px; background: rgba(255,255,255,0.9); padding: 2px 6px; border-radius: 5px; font-size: 9px; font-weight: 800; color: #e8507a; }

  /* --- MODAL --- */
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .modal.open { display: flex; }
  .modal-box { background: #fff; border-radius: 20px; width: 100%; max-width: 800px; overflow: hidden; position: relative; }
  .media-viewer { width: 100%; background: #000; display: flex; align-items: center; justify-content: center; min-height: 300px; }
  .media-viewer img, .media-viewer video { max-width: 100%; max-height: 70vh; }
  .modal-info { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
  .btn-close { position: absolute; top: 15px; right: 15px; background: #fff; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-weight: bold; z-index: 110; }
</style>
</head>
<body>

<div id="login">
  <div class="login-card">
    <div style="font-size: 40px; margin-bottom: 10px;">🌸</div>
    <h3>Ayuudesu Admin</h3>
    <p style="font-size: 12px; color: #999; margin-bottom: 20px;">Silakan login untuk kelola gallery</p>
    <input class="inp" id="pass" type="password" placeholder="Password" autofocus>
    <button class="btn-pink" onclick="login()">Login</button>
  </div>
</div>

<div id="app">
  <div class="header">
    <div style="color: #e8507a; font-weight: 700;">🌸 DASHBOARD</div>
    <button class="btn-nav" onclick="location.reload()">Logout</button>
  </div>

  <div class="main">
    <div class="nav-group">
      <button class="btn-nav" id="btn-sparkle" onclick="setCat('sparkle')">✨ Sparkle</button>
      <button class="btn-nav" id="btn-citlali" onclick="setCat('citlali')">🌙 Citlali</button>
      
      <div id="sub-nav" class="sub-nav">
        <button class="btn-nav" id="type-photo" onclick="setType('photo')">Photo</button>
        <button class="btn-nav" id="type-video" onclick="setType('video')">Video</button>
        <button class="btn-nav" id="type-audio" onclick="setType('audio')">Audio</button>
      </div>
    </div>

    <div id="grid" class="gallery-grid"></div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <button class="btn-close" onclick="closeModal()">✕</button>
    <div id="viewer" class="media-viewer"></div>
    <div class="modal-info">
      <div>
        <h4 id="m-title"></h4>
        <small id="m-meta" style="color: #999"></small>
      </div>
      <button class="btn-nav" style="color: red; border-color: #ffccd5" onclick="deleteItem()">Hapus</button>
    </div>
  </div>
</div>

<script>
let photos = [];
let curCat = '', curType = '', selectedId = null;

// --- GENERATOR DATA OTOMATIS (Agar Code Rapi) ---
function initData() {
  const data = [];
  
  // Sparkle Photos (1-8)
  for(let i=1; i<=8; i++) {
    data.push({ id: `s-p-${i}`, url: `Photo/Sparkle/${i}.JPG`, caption: `Sparkle Photo ${i}`, category: 'sparkle', type: 'photo' });
  }
  // Sparkle Video & Audio
  data.push({ id: `s-v-1`, url: `assets/vid01.mp4`, caption: `Sparkle Video`, category: 'sparkle', type: 'video' });
  data.push({ id: `s-a-1`, url: `Audio/Pelempuan.mp3`, caption: `Sparkle Audio`, category: 'sparkle', type: 'audio' });

  // Citlali Photos (1-25)
  for(let i=1; i<=25; i++) {
    const num = i < 10 ? `0${i}` : i;
    data.push({ id: `c-p-${i}`, url: `Photo/Citlali/IMG_${num}.JPG`, caption: `Citlali Photo ${i}`, category: 'citlali', type: 'photo' });
  }
  // Citlali Videos (1-5)
  for(let i=1; i<=5; i++) {
    data.push({ id: `c-v-${i}`, url: `Video/VID_0${i}.MOV`, caption: `Citlali Video ${i}`, category: 'citlali', type: 'video' });
  }

  photos = data.map(item => ({ ...item, addedAt: new Date().toISOString() }));
}

// --- APP LOGIC ---
function login() {
  if(document.getElementById('pass').value === 'AYUU00holly') {
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initData();
  } else alert('Salah password!');
}

function setCat(c) {
  curCat = c; curType = '';
  document.getElementById('sub-nav').style.display = 'flex';
  document.querySelectorAll('#btn-sparkle, #btn-citlali').forEach(b => b.classList.toggle('active', b.id === `btn-${c}`));
  render();
}

function setType(t) {
  curType = t;
  document.querySelectorAll('[id^="type-"]').forEach(b => b.classList.toggle('active', b.id === `type-${t}`));
  render();
}

function render() {
  const grid = document.getElementById('grid');
  const filtered = photos.filter(p => p.category === curCat && p.type === curType);
  
  if(!curType) { grid.innerHTML = 'Pilih tipe konten.'; return; }
  
  grid.innerHTML = filtered.map(p => `
    <div class="card" onclick="openModal('${p.id}')">
      <div class="card-thumb">
        ${p.type === 'photo' ? `<img src="${p.url}">` : `<span style="font-size:30px">${p.type==='video'?'🎥':'🎵'}</span>`}
        <div class="badge">${p.type.toUpperCase()}</div>
      </div>
      <div class="card-title">${p.caption}</div>
    </div>
  `).join('') || 'Belum ada data.';
}

function openModal(id) {
  selectedId = id;
  const item = photos.find(p => p.id === id);
  const viewer = document.getElementById('viewer');
  document.getElementById('m-title').textContent = item.caption;
  document.getElementById('m-meta').textContent = `${item.category.toUpperCase()} • ${item.type.toUpperCase()}`;
  
  if(item.type === 'photo') viewer.innerHTML = `<img src="${item.url}">`;
  else if(item.type === 'video') viewer.innerHTML = `<video src="${item.url}" controls autoplay></video>`;
  else viewer.innerHTML = `<audio src="${item.url}" controls autoplay></audio>`;
  
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('viewer').innerHTML = '';
}

function deleteItem() {
  if(confirm('Hapus item ini?')) {
    photos = photos.filter(p => p.id !== selectedId);
    closeModal(); render();
  }
}
</script>
</body>
</html>
